<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Побег Раптора: Universal</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            flex-direction: column; /* По умолчанию вертикально */
        }

        /* --- ШАПКА --- */
        header {
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            background: rgba(44, 62, 80, 0.9);
            flex-shrink: 0;
        }

        h1 { margin: 0; font-size: 18px; pointer-events: none; }

        .fs-btn {
            position: absolute;
            right: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 18px;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* --- ОСНОВНОЙ КОНТЕЙНЕР (Flex для игры и кнопок) --- */
        #main-layout {
            flex-grow: 1;
            display: flex;
            flex-direction: column; /* Вертикально по умолчанию */
            justify-content: center;
            align-items: center;
            width: 100%;
            height: calc(100% - 50px); /* Вычитаем шапку */
            position: relative;
        }

        /* --- ИГРОВОЕ ПОЛЕ --- */
        #game-container {
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border: 3px solid #ecf0f1;
            border-radius: 8px;
            background: #34495e;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { display: block; }

        /* --- UI СЛОЙ (МЕНЮ) --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 20;
            text-align: center;
            border-radius: 5px;
        }
        .hidden { display: none !important; }
        
        button.start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 50px;
            margin-top: 15px;
            box-shadow: 0 4px 0 #219150;
            font-weight: bold;
            cursor: pointer;
        }
        button.start-btn:active { transform: translateY(4px); box-shadow: none; }

        /* --- КНОПКИ УПРАВЛЕНИЯ --- */
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            padding: 10px;
            z-index: 100;
            /* Размеры задаются JS или медиа-запросами */
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            cursor: pointer;
            user-select: none;
        }
        
        .ctrl-btn:active, .ctrl-btn.pressed {
            background: rgba(46, 204, 113, 0.5);
            border-color: #2ecc71;
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

        /* =========================================
           АДАПТАЦИЯ ПОД ОРИЕНТАЦИЮ
           ========================================= */

        /* 1. ВЕРТИКАЛЬНАЯ (ПОРТРЕТНАЯ) */
        @media (orientation: portrait) {
            #main-layout { flex-direction: column; }
            
            #game-container {
                margin-bottom: 10px;
            }

            #controls {
                width: 260px;
                height: 150px;
                margin-bottom: 20px;
            }
            
            /* В фуллскрине кнопки полупрозрачные внизу */
            body.fullscreen-mode #controls {
                position: absolute;
                bottom: 10px;
                opacity: 0.4;
            }
            body.fullscreen-mode .ctrl-btn:active { opacity: 1; }
        }

        /* 2. ГОРИЗОНТАЛЬНАЯ (ЛАНДШАФТНАЯ) */
        @media (orientation: landscape) {
            #main-layout { 
                flex-direction: row; /* Игра слева, кнопки справа */
                justify-content: center;
                align-items: center;
                gap: 20px;
            }

            header {
                position: absolute;
                top: 0; left: 0;
                width: auto;
                background: transparent;
                padding: 10px;
            }
            
            /* В ландшафте убираем рамку у игры для экономии места */
            #game-container {
                border: none;
                box-shadow: none;
                background: transparent;
            }

            /* Кнопки становятся вертикальным блоком справа */
            #controls {
                width: 180px;
                height: 240px;
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, 1fr);
                margin: 0;
            }

            /* Перестановка кнопок для ландшафта */
            #btn-up { grid-column: 1 / span 2; grid-row: 1; }
            #btn-left { grid-column: 1; grid-row: 2; }
            #btn-right { grid-column: 2; grid-row: 2; }
            #btn-down { grid-column: 1 / span 2; grid-row: 3; }

            /* В фуллскрине кнопки прижимаем к правому краю */
            body.fullscreen-mode #controls {
                position: absolute;
                right: 20px;
                top: 50%;
                transform: translateY(-50%);
                opacity: 0.4;
            }
            body.fullscreen-mode .ctrl-btn:active { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🦖 Побег Раптора 👹</h1>
        <button class="fs-btn" onclick="toggleFullScreen()">[ ⛶ ]</button>
    </header>
    
    <div id="main-layout">
        <div id="game-container">
            <canvas id="mazeCanvas"></canvas>
            <div id="ui-layer">
                <h2 id="msg-title">Готов?</h2>
                <p id="msg-desc" style="font-size: 14px;">Найди выход 🚪 раньше монстра!</p>
                <button class="start-btn" onclick="startGame()">ИГРАТЬ</button>
            </div>
        </div>

        <div id="controls">
            <div class="ctrl-btn" id="btn-up">⬆️</div>
            <div class="ctrl-btn" id="btn-left">⬅️</div>
            <div class="ctrl-btn" id="btn-down">⬇️</div>
            <div class="ctrl-btn" id="btn-right">➡️</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');
    const uiLayer = document.getElementById('ui-layer');
    const msgTitle = document.getElementById('msg-title');
    const msgDesc = document.getElementById('msg-desc');

    // Настройки
    const COLS = 11; 
    const ROWS = 11;
    const MOVE_SPEED = 0.35; 
    const MONSTER_MOVE_INTERVAL = 1200; 
    const MONSTER_VISION = 3; 
    let CELL_SIZE = 30;

    let maze = [];
    let gameRunning = false;
    let monsterInterval = null;
    let animationFrameId = null;

    let player = { gx: 0, gy: 0, x: 0, y: 0, facingRight: true, isMoving: false };
    let monster = { gx: 0, gy: 0, x: 0, y: 0 };
    let exitPos = { x: 0, y: 0 };

    // --- FULLSCREEN LOGIC ---
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) document.body.classList.add('fullscreen-mode');
        else document.body.classList.remove('fullscreen-mode');
        setTimeout(resize, 100);
    });

    // --- SMART RESIZE (УНИВЕРСАЛЬНЫЙ) ---
    function resize() {
        const isLandscape = window.innerWidth > window.innerHeight;
        const isFS = document.body.classList.contains('fullscreen-mode');
        
        // Определяем доступное место
        let availW = window.innerWidth;
        let availH = window.innerHeight;

        // Вычитаем место под интерфейсы
        if (isLandscape) {
            // В ландшафте: Шапка (если не FS) + Отступы + Кнопки справа (~200px)
            availW -= 220; 
            if (!isFS) availH -= 50; // Шапка
        } else {
            // В портрете: Шапка (50) + Кнопки снизу (~180)
            availH -= 230; 
            if (!isFS) availW *= 0.95; // Небольшой отступ по бокам
        }

        // Безопасные границы
        if (availW < 100) availW = 100;
        if (availH < 100) availH = 100;

        // Расчет размера клетки
        const cellW = Math.floor(availW / COLS);
        const cellH = Math.floor(availH / ROWS);
        CELL_SIZE = Math.min(cellW, cellH, 60); // Макс 60px

        canvas.width = COLS * CELL_SIZE;
        canvas.height = ROWS * CELL_SIZE;

        if (gameRunning || maze.length > 0) draw();
    }

    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', () => setTimeout(resize, 300));
    resize();

    // --- GAME LOGIC (Без изменений) ---
    function generateMaze() {
        maze = [];
        for (let y = 0; y < ROWS; y++) {
            let row = [];
            for (let x = 0; x < COLS; x++) {
                row.push({ visited: false, walls: { top: true, right: true, bottom: true, left: true } });
            }
            maze.push(row);
        }
        let stack = [{x: 0, y: 0}];
        maze[0][0].visited = true;
        while (stack.length > 0) {
            let current = stack[stack.length - 1];
            let neighbors = [];
            const dirs = [{dx:0, dy:-1}, {dx:1, dy:0}, {dx:0, dy:1}, {dx:-1, dy:0}];
            for (let d of dirs) {
                let nx = current.x + d.dx, ny = current.y + d.dy;
                if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !maze[ny][nx].visited) 
                    neighbors.push({x: nx, y: ny});
            }
            if (neighbors.length > 0) {
                let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                let dx = current.x - next.x, dy = current.y - next.y;
                if (dx === 1) { maze[current.y][current.x].walls.left = false; maze[next.y][next.x].walls.right = false; }
                else if (dx === -1) { maze[current.y][current.x].walls.right = false; maze[next.y][next.x].walls.left = false; }
                if (dy === 1) { maze[current.y][current.x].walls.top = false; maze[next.y][next.x].walls.bottom = false; }
                else if (dy === -1) { maze[current.y][current.x].walls.bottom = false; maze[next.y][next.x].walls.top = false; }
                maze[next.y][next.x].visited = true;
                stack.push(next);
            } else { stack.pop(); }
        }
    }

    function startGame() {
        generateMaze();
        resize(); 
        player = { gx: 0, gy: 0, x: 0, y: 0, facingRight: true, isMoving: false };
        exitPos = { x: COLS - 1, y: ROWS - 1 };
        monster = { gx: COLS - 1, gy: 0, x: (COLS - 1) * CELL_SIZE, y: 0 };
        uiLayer.classList.add('hidden');
        gameRunning = true;
        if (monsterInterval) clearInterval(monsterInterval);
        monsterInterval = setInterval(moveMonsterLogic, MONSTER_MOVE_INTERVAL); 
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        gameLoop();
    }

    function gameLoop() {
        updateAnimations();
        draw();
        if (gameRunning) animationFrameId = requestAnimationFrame(gameLoop);
    }

    function updateAnimations() {
        const targetX = player.gx * CELL_SIZE;
        const targetY = player.gy * CELL_SIZE;
        const dx = targetX - player.x;
        const dy = targetY - player.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 1) {
            player.x = targetX; player.y = targetY; player.isMoving = false;
        } else {
            player.x += dx * MOVE_SPEED; player.y += dy * MOVE_SPEED; player.isMoving = true;
        }
        const mTargetX = monster.gx * CELL_SIZE;
        const mTargetY = monster.gy * CELL_SIZE;
        monster.x += (mTargetX - monster.x) * 0.15;
        monster.y += (mTargetY - monster.y) * 0.15;
    }

    function moveMonsterLogic() {
        if (!gameRunning) return;
        const dist = Math.abs(player.gx - monster.gx) + Math.abs(player.gy - monster.gy);
        if (dist <= MONSTER_VISION) chasePlayer();
        else wanderRandomly();
        checkWinLoss();
    }

    function chasePlayer() {
        let queue = [[{x: monster.gx, y: monster.gy}]];
        let visited = new Set([`${monster.gx},${monster.gy}`]);
        let path = null;
        while (queue.length > 0) {
            let currentPath = queue.shift();
            let pos = currentPath[currentPath.length - 1];
            if (pos.x === player.gx && pos.y === player.gy) { path = currentPath; break; }
            const moves = [{dx:0, dy:-1, wall:'top'}, {dx:1, dy:0, wall:'right'}, {dx:0, dy:1, wall:'bottom'}, {dx:-1, dy:0, wall:'left'}];
            for (let m of moves) {
                let nx = pos.x + m.dx, ny = pos.y + m.dy;
                let key = `${nx},${ny}`;
                if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !visited.has(key) && !maze[pos.y][pos.x].walls[m.wall]) {
                    visited.add(key);
                    queue.push([...currentPath, {x: nx, y: ny}]);
                }
            }
        }
        if (path && path.length > 1) { monster.gx = path[1].x; monster.gy = path[1].y; }
    }

    function wanderRandomly() {
        const moves = [{dx:0, dy:-1, wall:'top'}, {dx:1, dy:0, wall:'right'}, {dx:0, dy:1, wall:'bottom'}, {dx:-1, dy:0, wall:'left'}];
        moves.sort(() => Math.random() - 0.5);
        for (let m of moves) {
            let nx = monster.gx + m.dx; let ny = monster.gy + m.dy;
            if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !maze[monster.gy][monster.gx].walls[m.wall]) {
                monster.gx = nx; monster.gy = ny; return;
            }
        }
    }

    function handleInput(direction) {
        if (!gameRunning || player.isMoving) return;
        let cell = maze[player.gy][player.gx];
        let moved = false;
        switch(direction) {
            case 'up':    if (!cell.walls.top)    { player.gy--; moved = true; } break;
            case 'right': if (!cell.walls.right)  { player.gx++; player.facingRight = true; moved = true; } break;
            case 'down':  if (!cell.walls.bottom) { player.gy++; moved = true; } break;
            case 'left':  if (!cell.walls.left)   { player.gx--; player.facingRight = false; moved = true; } break;
        }
        if (moved) checkWinLoss();
    }

    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowUp': case 'w': handleInput('up'); break;
            case 'ArrowRight': case 'd': handleInput('right'); break;
            case 'ArrowDown': case 's': handleInput('down'); break;
            case 'ArrowLeft': case 'a': handleInput('left'); break;
        }
    });

    const btns = {'btn-up': 'up', 'btn-right': 'right', 'btn-down': 'down', 'btn-left': 'left'};
    Object.keys(btns).forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            el.classList.add('pressed');
            handleInput(btns[id]);
            setTimeout(() => el.classList.remove('pressed'), 150);
        });
    });

    let touchStartX = 0, touchStartY = 0;
    document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: false});
    document.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].screenX - touchStartX;
        const dy = e.changedTouches[0].screenY - touchStartY;
        if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return; 
        if (Math.abs(dx) > Math.abs(dy)) handleInput(dx > 0 ? 'right' : 'left');
        else handleInput(dy > 0 ? 'down' : 'up');
    }, {passive: false});
    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

    function checkWinLoss() {
        if (player.gx === exitPos.x && player.gy === exitPos.y) gameOver(true);
        else if (player.gx === monster.gx && player.gy === monster.gy) gameOver(false);
    }

    function gameOver(win) {
        gameRunning = false;
        clearInterval(monsterInterval);
        cancelAnimationFrame(animationFrameId);
        draw();
        uiLayer.classList.remove('hidden');
        msgTitle.innerText = win ? "🎉 ПОБЕДА!" : "💀 ПОЙМАН!";
        msgTitle.style.color = win ? "#2ecc71" : "#e74c3c";
        msgDesc.innerHTML = win ? "Твой раптор спасся!<br>Попробуй еще раз?" : "Монстр оказался хитрее...<br>Попробуй еще раз?";
    }

    function draw() {
        ctx.fillStyle = '#34495e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#ecf0f1';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                let cx = x * CELL_SIZE, cy = y * CELL_SIZE;
                let w = maze[y][x].walls;
                if (w.top) { ctx.moveTo(cx, cy); ctx.lineTo(cx + CELL_SIZE, cy); }
                if (w.right) { ctx.moveTo(cx + CELL_SIZE, cy); ctx.lineTo(cx + CELL_SIZE, cy + CELL_SIZE); }
                if (w.bottom) { ctx.moveTo(cx + CELL_SIZE, cy + CELL_SIZE); ctx.lineTo(cx, cy + CELL_SIZE); }
                if (w.left) { ctx.moveTo(cx, cy + CELL_SIZE); ctx.lineTo(cx, cy); }
            }
        }
        ctx.stroke();
        const off = CELL_SIZE / 2;
        const fontSize = Math.floor(CELL_SIZE * 0.7);
        ctx.font = `${fontSize}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🚪', exitPos.x * CELL_SIZE + off, exitPos.y * CELL_SIZE + off);
        ctx.fillText('👹', monster.x + off, monster.y + off);
        ctx.save();
        ctx.translate(player.x + off, player.y + off);
        if (!player.facingRight) ctx.scale(-1, 1);
        ctx.fillText('🦖', 0, 0);
        ctx.restore();
    }
</script>
</body>
</html>
