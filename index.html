<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Лабиринт: Динозавр и Монстр</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      background: #0b0f1a;
      color: #fff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      border: 2px solid #444;
      background: #111;
    }
    .ui-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
      text-align: center;
    }
    .hud {
      pointer-events: none;
      font-size: 14px;
      letter-spacing: 2px;
      text-shadow: 0 2px 4px #000;
    }
    .status {
      font-weight: bold;
      font-size: 18px;
    }
    .controls-hint {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 4px;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: auto;
    }
    .btn {
      margin: 12px 0;
      padding: 12px 24px;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      transition: 0.1s;
    }
    .btn:hover { background: #fff; color: #000; }
    .hidden { display: none !important; }

    .touch-controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 60px);
      gap: 8px;
      pointer-events: auto;
    }
    .d-pad-btn {
      width: 60px; height: 60px;
      border-radius: 12px;
      background: rgba(255,255,255,0.15);
      color: white;
      border: none;
      font-family: inherit;
      font-size: 20px;
      cursor: pointer;
    }
    .d-pad-btn:active { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div class="ui-layer">
      <div class="hud">
        <span class="status" id="statusText">БЕГИ!</span>
        <br>
        <span id="timerText">Время: 60</span> | <span id="scoreText">Счёт: 0</span>
      </div>
      <div class="controls-hint">Управление: стрелки / кнопки</div>
    </div>

    <!-- Стартовый экран -->
    <div id="startOverlay" class="overlay">
      <h1 style="font-size:32px; margin-bottom:16px;">ЛАБИРИНТ</h1>
      <p style="max-width:360px; text-align:center; margin-bottom:24px;">
        Ты верхом на динозавре. Найди выход из лабиринта, пока монстр не догнал тебя.
      </p>
      <button class="btn" id="startBtn">СТАРТ</button>
    </div>

    <!-- Экран проигрыша/победы -->
    <div id="endOverlay" class="overlay hidden">
      <h1 id="endTitle" style="font-size:32px; margin-bottom:12px;"></h1>
      <p id="endDesc" style="margin-bottom:20px;"></p>
      <button class="btn" id="restartBtn">ЕЩЁ РАЗ</button>
    </div>

    <!-- Сенсорные кнопки -->
    <div class="touch-controls">
      <button class="d-pad-btn" id="btnUp">⬆️</button>
      <button class="d-pad-btn" id="btnLeft">⬅️</button>
      <button class="d-pad-btn" id="btnRight">➡️</button>
      <button class="d-pad-btn" id="btnDown">⬇️</button>
      <div style="grid-column: 2 / 4; text-align: center; font-size:10px; opacity:0.6;">
        или клавиши-стрелки
      </div>
    </div>
  </div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Настройка размера
  function resize() {
    const size = Math.min(window.innerWidth, window.innerHeight) * 0.9;
    canvas.width = size;
    canvas.height = size;
  }
  window.addEventListener('resize', resize);
  resize();

  // Константы
  const TILE = 40;
  const COLS = Math.floor(canvas.width / TILE);
  const ROWS = Math.floor(canvas.height / TILE);

  const WALL = 1;
  const EMPTY = 0;

  let grid = [];
  let player = { x: 0, y: 0, vx: 0, vy: 0, speed: 3.5 };
  let monster = { x: 0, y: 0, vx: 0, vy: 0, speed: 4.0 };
  let exit = { x: 0, y: 0 };

  let timeLeft = 60;
  let score = 0;
  let gameActive = false;
  let frameId;

  // UI элементы
  const startOverlay = document.getElementById('startOverlay');
  const endOverlay = document.getElementById('endOverlay');
  const statusText = document.getElementById('statusText');
  const timerText = document.getElementById('timerText');
  const scoreText = document.getElementById('scoreText');
  const endTitle = document.getElementById('endTitle');
  const endDesc = document.getElementById('endDesc');

  // Управление
  const keys = { up: false, down: false, left: false, right: false };
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp') keys.up = true;
    if (e.key === 'ArrowDown') keys.down = true;
    if (e.key === 'ArrowLeft') keys.left = true;
    if (e.key === 'ArrowRight') keys.right = true;
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowUp') keys.up = false;
    if (e.key === 'ArrowDown') keys.down = false;
    if (e.key === 'ArrowLeft') keys.left = false;
    if (e.key === 'ArrowRight') keys.right = false;
  });

  // Кнопки
  ['Up','Down','Left','Right'].forEach(dir => {
    const btn = document.getElementById('btn' + dir);
    btn.addEventListener('pointerdown', () => keys[dir.toLowerCase()] = true);
    btn.addEventListener('pointerup', () => keys[dir.toLowerCase()] = false);
    btn.addEventListener('pointerleave', () => keys[dir.toLowerCase()] = false);
  });

  function generateMaze() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      const row = [];
      for (let c = 0; c < COLS; c++) {
        if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
          row.push(WALL);
        } else {
          // 35% шанс стены
          row.push(Math.random() < 0.35 ? WALL : EMPTY);
        }
      }
      grid.push(row);
    }

    // Гарантированный старт и выход
    player.x = TILE * 2;
    player.y = TILE * 2;
    exit.x = TILE * (COLS - 3);
    exit.y = TILE * (ROWS - 3);

    // Монстр — где-то в середине, но не слишком близко к игроку
    monster.x = TILE * Math.floor(COLS / 2);
    monster.y = TILE * Math.floor(ROWS / 2);

    score = 0;
    timeLeft = 60;
  }

  // Проверка коллизии с сеткой (возвращает true, если клетка — стена)
  function isWall(x, y) {
    const col = Math.floor(x / TILE);
    const row = Math.floor(y / TILE);
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return true;
    return grid[row][col] === WALL;
  }

  // Проверка, можно ли пройти в точку (x,y) с учётом размера хитбокса
  function canMoveTo(x, y, size = 20) {
    // Проверяем 4 угла хитбокса
    const corners = [
      {x: x - size/2, y: y - size/2},
      {x: x + size/2, y: y - size/2},
      {x: x - size/2, y: y + size/2},
      {x: x + size/2, y: y + size/2}
    ];
    for (const c of corners) {
      if (isWall(c.x, c.y)) return false;
    }
    return true;
  }

  function update() {
    if (!gameActive) return;

    // Движение игрока
    player.vx = player.vy = 0;
    if (keys.up) player.vy -= player.speed;
    if (keys.down) player.vy += player.speed;
    if (keys.left) player.vx -= player.speed;
    if (keys.right) player.vx += player.speed;

    // Коллизия игрока: пробуем двигаться по X, потом по Y
    let nextX = player.x + player.vx;
    let nextY = player.y + player.vy;

    if (canMoveTo(nextX, player.y)) {
      player.x = nextX;
    }
    if (canMoveTo(player.x, nextY)) {
      player.y = nextY;
    }

    // Ограничение по экрану
    player.x = Math.max(TILE + 10, Math.min(canvas.width - TILE - 10, player.x));
    player.y = Math.max(TILE + 10, Math.min(canvas.height - TILE - 10, player.y));

    // Движение монстра с коллизиями (как у игрока)
    const dx = player.x - monster.x;
    const dy = player.y - monster.y;
    const dist = Math.hypot(dx, dy);
    
    monster.vx = monster.vy = 0;
    if (dist > 1) {
      monster.vx = (dx / dist) * monster.speed;
      monster.vy = (dy / dist) * monster.speed;
    }

    nextX = monster.x + monster.vx;
    nextY = monster.y + monster.vy;

    // Пробуем сначала по X, потом по Y (чтобы не застревал в углах)
    if (canMoveTo(nextX, monster.y, 22)) {
      monster.x = nextX;
    }
    if (canMoveTo(monster.x, nextY, 22)) {
      monster.y = nextY;
    }

    // Проверка: игрок коснулся выхода
    if (Math.abs(player.x - exit.x) < TILE - 4 && Math.abs(player.y - exit.y) < TILE - 4) {
      winGame();
    }

    // Проверка: монстр поймал игрока
    if (Math.hypot(player.x - monster.x, player.y - monster.y) < 35) {
      loseGame();
    }

    timeLeft -= 1 / 60; // ~1 сек за 60 кадров
    if (timeLeft <= 0) loseGame();

    updateUI();
  }

  function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Рисуем лабиринт
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] === WALL) {
          ctx.fillStyle = '#333';
          ctx.strokeStyle = '#555';
          const x = c * TILE;
          const y = r * TILE;
          ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
          ctx.strokeRect(x, y, TILE, TILE);
        }
      }
    }

    // Выход
    ctx.fillStyle = '#0f0';
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = 15;
    ctx.fillRect(exit.x + 4, exit.y + 4, TILE - 8, TILE - 8);
    ctx.shadowBlur = 0;

    // Динозавр (игрок)
    drawDino(player.x, player.y);

    // Монстр
    drawMonster(monster.x, monster.y);
  }

  function drawDino(x, y) {
    ctx.save();
    ctx.translate(x, y);

    // Тело динозавра (более выразительное)
    ctx.fillStyle = '#4a8f4a';
    ctx.beginPath();
    ctx.ellipse(0, -4, 20, 14, 0, 0, Math.PI*2);
    ctx.fill();

    // Голова
    ctx.fillStyle = '#2a7a2a';
    ctx.beginPath();
    ctx.arc(-16, -10, 12, 0, Math.PI*2);
    ctx.fill();
    // Глаз
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-11, -8, 4, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-9, -7, 1.5, 0, Math.PI*2);
    ctx.fill();

    // Хвост с шипами
    ctx.beginPath();
    ctx.moveTo(20, -2);
    ctx.lineTo(38, -6);
    ctx.strokeStyle = '#4a8f
    ctx.strokeStyle = '#4a8f4a';
    ctx.lineWidth = 4;
    ctx.stroke();

    // Шипы на хвосте
    ctx.fillStyle = '#2a7a2a';
    for (let i = 1; i <= 3; i++) {
      const px = 20 + i * 6;
      const py = -6 + (i % 2 ? -4 : 4);
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + 8, py - 4);
      ctx.lineTo(px + 8, py + 4);
      ctx.closePath();
      ctx.fill();
    }

    // Ноги
    ctx.fillStyle = '#3a7a3a';
    ctx.beginPath();
    ctx.rect(-10, 10, 8, 14); // левая
    ctx.rect(2, 10, 8, 14);  // правая
    ctx.fill();

    // Всадник (более детализированный)
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(0, -14, 6, 9, 0, 0, Math.PI*2); // тело
    ctx.fill();

    ctx.fillStyle = '#ff0'; // шлем
    ctx.beginPath();
    ctx.arc(0, -22, 5, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#000'; // глаза всадника
    ctx.beginPath();
    ctx.arc(-2, -21, 1.5, 0, Math.PI*2);
    ctx.arc(2, -21, 1.5, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();
  }

  function drawMonster(x, y) {
    ctx.save();
    ctx.translate(x, y);

    // Тело монстра (с градиентом для объёма)
    const grd = ctx.createRadialGradient(0, 0, 5, 0, 0, 22);
    grd.addColorStop(0, '#aa0000');
    grd.addColorStop(1, '#550000');
    ctx.fillStyle = grd;
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.ellipse(0, 0, 22, 18, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Глаза (светящиеся)
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-9, -5, 4, 0, Math.PI*2);
    ctx.arc(9, -5, 4, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-8, -4, 1.8, 0, Math.PI*2);
    ctx.arc(8, -4, 1.8, 0, Math.PI*2);
    ctx.fill();

    // Пасть с зубами
    ctx.fillStyle = '#330000';
    ctx.beginPath();
    ctx.moveTo(-16, 8);
    ctx.lineTo(16, 8);
    ctx.lineTo(0, 24);
    ctx.closePath();
    ctx.fill();

    // Зубы
    ctx.fillStyle = '#fff';
    for (let t = -12; t <= 12; t += 6) {
      ctx.beginPath();
      ctx.moveTo(t, 8);
      ctx.lineTo(t + 4, 8);
      ctx.lineTo(t + 2, 16);
      ctx.closePath();
      ctx.fill();
    }

    // Когти/шипы по бокам (чтобы выглядел агрессивнее)
    ctx.fillStyle = '#770000';
    const spikes = [
      {x: -24, y: -4}, {x: -26, y: 4},
      {x: 24, y: -4},  {x: 26, y: 4}
    ];
    spikes.forEach(s => {
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - 8, s.y - 4);
      ctx.lineTo(s.x - 8, s.y + 4);
      ctx.closePath();
      ctx.fill();
    });

    ctx.restore();
  }

  function updateUI() {
    timerText.textContent = 'Время: ' + Math.max(0, Math.floor(timeLeft));
    scoreText.textContent = 'Счёт: ' + score;
  }

  function winGame() {
    gameActive = false;
    statusText.textContent = 'ПОБЕДА!';
    statusText.style.color = '#0f0';
    score += 100;
    updateUI();
    showEndScreen('🎉 ПОБЕДА! 🎉', 'Ты сбежал из лабиринта!');
  }

  function loseGame() {
    gameActive = false;
    statusText.textContent = 'ПРОИГРАЛ';
    statusText.style.color = '#f00';
    showEndScreen('💀 ТЕБЯ ПОЙМАЛИ 💀', 'Попробуй ещё раз!');
  }

  function showEndScreen(title, desc) {
    endTitle.textContent = title;
    endDesc.textContent = desc;
    endOverlay.classList.remove('hidden');
    cancelAnimationFrame(frameId);
  }

  function startGame() {
    generateMaze();
    startOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    gameActive = true;
    timeLeft = 60;
    score = 0;
    updateUI();
    loop();
  }

  function restartGame() {
    startGame();
  }

  function loop() {
    if (!gameActive) return;
    update();
    draw();
    frameId = requestAnimationFrame(loop);
  }

  // Обработчики кнопок
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', restartGame);

  // Старт по тапу по холсту (для мобильных)
  canvas.addEventListener('pointerdown', (e) => {
    if (gameActive === false && endOverlay.classList.contains('hidden')) {
      // Если игра не активна и экран конца скрыт — пробуем стартовать, если видим стартовый экран
      if (startOverlay.style.display !== 'none' || startOverlay.offsetParent !== null) {
        startGame();
      }
    }
  });
})();
</script>
</body>
</html>
