<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Лабиринт: Динозавр и Монстр</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      background: #0b0f1a;
      color: #fff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      touch-action: manipulation;
    }
    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      border: 2px solid #444;
      background: #111;
    }
    .ui-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
      text-align: center;
    }
    .hud {
      pointer-events: none;
      font-size: 14px;
      letter-spacing: 2px;
      text-shadow: 0 2px 4px #000;
    }
    .status {
      font-weight: bold;
      font-size: 18px;
    }
    .controls-hint {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 4px;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: auto;
    }
    .btn {
      margin: 12px 0;
      padding: 12px 24px;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      transition: 0.1s;
    }
    .btn:hover { background: #fff; color: #000; }
    .hidden { display: none !important; }

    .touch-controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 60px);
      gap: 8px;
      pointer-events: auto;
    }
    .d-pad-btn {
      width: 60px; height: 60px;
      border-radius: 12px;
      background: rgba(255,255,255,0.15);
      color: white;
      border: none;
      font-family: inherit;
      font-size: 20px;
      cursor: pointer;
    }
    .d-pad-btn:active { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div class="ui-layer">
      <div class="hud">
        <span class="status" id="statusText">БЕГИ!</span>
        <br>
        <span id="timerText">Время: 60</span> | <span id="scoreText">Счёт: 0</span>
      </div>
      <div class="controls-hint">Управление: стрелки / кнопки</div>
    </div>

    <!-- Стартовый экран -->
    <div id="startOverlay" class="overlay">
      <h1 style="font-size:32px; margin-bottom:16px;">ЛАБИРИНТ</h1>
      <p style="max-width:360px; text-align:center; margin-bottom:24px;">
        Ты верхом на динозавре. Найди выход из лабиринта, пока монстр не догнал тебя.
      </p>
      <button class="btn" id="startBtn">СТАРТ</button>
    </div>

    <!-- Экран проигрыша/победы -->
    <div id="endOverlay" class="overlay hidden">
      <h1 id="endTitle" style="font-size:32px; margin-bottom:12px;"></h1>
      <p id="endDesc" style="margin-bottom:20px;"></p>
      <button class="btn" id="restartBtn">ЕЩЁ РАЗ</button>
    </div>

    <!-- Сенсорные кнопки -->
    <div class="touch-controls">
      <button class="d-pad-btn" id="btnUp">⬆️</button>
      <button class="d-pad-btn" id="btnLeft">⬅️</button>
      <button class="d-pad-btn" id="btnRight">➡️</button>
      <button class="d-pad-btn" id="btnDown">⬇️</button>
      <div style="grid-column: 2 / 4; text-align: center; font-size:10px; opacity:0.6;">
        или клавиши-стрелки
      </div>
    </div>
  </div>

<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Настройка размера
  function resize() {
    const size = Math.min(window.innerWidth, window.innerHeight) * 0.9;
    canvas.width = size;
    canvas.height = size;
  }
  window.addEventListener('resize', resize);
  resize();

  // Константы
  const TILE = 40;
  const COLS = Math.floor(canvas.width / TILE);
  const ROWS = Math.floor(canvas.height / TILE);

  const WALL = 1;
  const EMPTY = 0;

  let grid = [];
  let player = { x: 0, y: 0, vx: 0, vy: 0, speed: 3.5 };
  let monster = { x: 0, y: 0, speed: 4.2 };
  let exit = { x: 0, y: 0 };

  let timeLeft = 60;
  let score = 0;
  let gameActive = false;
  let frameId;

  // UI элементы
  const startOverlay = document.getElementById('startOverlay');
  const endOverlay = document.getElementById('endOverlay');
  const statusText = document.getElementById('statusText');
  const timerText = document.getElementById('timerText');
  const scoreText = document.getElementById('scoreText');
  const endTitle = document.getElementById('endTitle');
  const endDesc = document.getElementById('endDesc');

  // Управление
  const keys = { up: false, down: false, left: false, right: false };
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowUp') keys.up = true;
    if (e.key === 'ArrowDown') keys.down = true;
    if (e.key === 'ArrowLeft') keys.left = true;
    if (e.key === 'ArrowRight') keys.right = true;
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowUp') keys.up = false;
    if (e.key === 'ArrowDown') keys.down = false;
    if (e.key === 'ArrowLeft') keys.left = false;
    if (e.key === 'ArrowRight') keys.right = false;
  });

  // Кнопки
  ['Up','Down','Left','Right'].forEach(dir => {
    const btn = document.getElementById('btn' + dir);
    btn.addEventListener('pointerdown', () => keys[dir.toLowerCase()] = true);
    btn.addEventListener('pointerup', () => keys[dir.toLowerCase()] = false);
    btn.addEventListener('pointerleave', () => keys[dir.toLowerCase()] = false);
  });

  function generateMaze() {
    // Простая генерация: стены по краям, внутри рандом
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      const row = [];
      for (let c = 0; c < COLS; c++) {
        if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
          row.push(WALL);
        } else {
          // 35% шанс стены
          row.push(Math.random() < 0.35 ? WALL : EMPTY);
        }
      }
      grid.push(row);
    }

    // Гарантированный старт и выход
    player.x = TILE * 2;
    player.y = TILE * 2;
    exit.x = TILE * (COLS - 3);
    exit.y = TILE * (ROWS - 3);

    // Монстр — где-то в середине
    monster.x = TILE * Math.floor(COLS / 2);
    monster.y = TILE * Math.floor(ROWS / 2);

    score = 0;
    timeLeft = 60;
  }

  function update() {
    if (!gameActive) return;

    // Движение игрока
    player.vx = player.vy = 0;
    if (keys.up) player.vy -= player.speed;
    if (keys.down) player.vy += player.speed;
    if (keys.left) player.vx -= player.speed;
    if (keys.right) player.vx += player.speed;

    // Коллизия игрока со стенами (простая)
    const nextX = player.x + player.vx;
    const nextY = player.y + player.vy;

    const tileX = Math.floor((nextX + player.speed) / TILE);
    const tileY = Math.floor((nextY + player.speed) / TILE);
    const tileXL = Math.floor((player.x - player.speed) / TILE);
    const tileXR = Math.floor((player.x + player.speed) / TILE);
    const tileYT = Math.floor((player.y - player.speed) / TILE);
    const tileYB = Math.floor((player.y + player.speed) / TILE);

    let canMoveX = true, canMoveY = true;

    if (player.vx !== 0) {
      if (tileX >= 0 && tileX < COLS && grid[tileYT][tileX] === WALL && grid[tileYB][tileX] === WALL) canMoveX = false;
      if (player.vx > 0 && tileXR >= 0 && tileXR < COLS && grid[tileYT][tileXR] === WALL && grid[tileYB][tileXR] === WALL) canMoveX = false;
      if (player.vx < 0 && tileXL >= 0 && tileXL < COLS && grid[tileYT][tileXL] === WALL && grid[tileYB][tileXL] === WALL) canMoveX = false;
    }
    if (player.vy !== 0) {
      if (tileY >= 0 && tileY < ROWS && grid[tileY][tileXL] === WALL && grid[tileY][tileXR] === WALL) canMoveY = false;
      if (player.vy > 0 && tileYB >= 0 && tileYB < ROWS && grid[tileYB][tileXL] === WALL && grid[tileYB][tileXR] === WALL) canMoveY = false;
      if (player.vy < 0 && tileYT >= 0 && tileYT < ROWS && grid[tileYT][tileXL] === WALL && grid[tileYT][tileXR] === WALL) canMoveY = false;
    }

    if (canMoveX) player.x += player.vx;
    if (canMoveY) player.y += player.vy;

    // Ограничение по экрану
    player.x = Math.max(TILE, Math.min(canvas.width - TILE - 20, player.x));
    player.y = Math.max(TILE, Math.min(canvas.height - TILE - 20, player.y));

    // Движение монстра к игроку
    const dx = player.x - monster.x;
    const dy = player.y - monster.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 1) {
      monster.x += (dx / dist) * monster.speed;
      monster.y += (dy / dist) * monster.speed;
    }

    // Проверка: игрок коснулся выхода
    if (Math.abs(player.x - exit.x) < TILE - 4 && Math.abs(player.y - exit.y) < TILE - 4) {
      winGame();
    }

    // Проверка: монстр поймал игрока
    if (Math.hypot(player.x - monster.x, player.y - monster.y) < 35) {
      loseGame();
    }

    timeLeft -= 1 / 60; // ~1 сек за 60 кадров
    if (timeLeft <= 0) loseGame();

    updateUI();
  }

  function draw() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Рисуем лабиринт
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] === WALL) {
          ctx.fillStyle = '#333';
          ctx.strokeStyle = '#555';
          const x = c * TILE;
          const y = r * TILE;
          ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
          ctx.strokeRect(x, y, TILE, TILE);
        }
      }
    }

    // Выход
    ctx.fillStyle = '#0f0';
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = 15;
    ctx.fillRect(exit.x + 4, exit.y + 4, TILE - 8, TILE - 8);
    ctx.shadowBlur = 0;

    // Динозавр (игрок)
    drawDino(player.x, player.y);

    // Монстр
    drawMonster(monster.x, monster.y);
  }

  function drawDino(x, y) {
    ctx.save();
    ctx.translate(x, y);
    // Тело
    ctx.fillStyle = '#4a8f4a';
    ctx.beginPath();
    ctx.ellipse(0, 0, 16, 12, 0, 0, Math.PI*2);
    ctx.fill();
    // Голова
    ctx.fillStyle = '#2a7a2a';
    ctx.beginPath();
    ctx.arc(-12, -4, 10, 0, Math.PI*2);
    ctx.fill();
    // Хвост
    ctx.beginPath();
    ctx.moveTo(16, -2);
    ctx.lineTo(28, -6);
    ctx.strokeStyle = '#4a8f4a';
    ctx.lineWidth = 4;
    ctx.stroke();
    // Всадник
    ctx.fillStyle = '#fff';
    ctx.fillRect(-4, -14, 8, 12); // тело
    ctx.fillStyle = '#ff0';
    // Всадник (голова)
    ctx.beginPath();
    ctx.arc(0, -18, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function drawMonster(x, y) {
    ctx.save();
    ctx.translate(x, y);

    // Тело монстра
    ctx.fillStyle = '#8b0000';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.ellipse(0, 0, 20, 16, 0, 0, Math.PI*2);
    ctx.fill();

    // Глаза
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-8, -4, 3, 0, Math.PI*2);
    ctx.arc(8, -4, 3, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-8, -4, 1.5, 0, Math.PI*2);
    ctx.arc(8, -4, 1.5, 0, Math.PI*2);
    ctx.fill();

    // Зубы/пасть
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.moveTo(-12, 6);
    ctx.lineTo(12, 6);
    ctx.lineTo(0, 18);
    ctx.closePath();
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function updateUI() {
    timerText.textContent = 'Время: ' + Math.max(0, Math.floor(timeLeft));
    scoreText.textContent = 'Счёт: ' + score;
  }

  function winGame() {
    gameActive = false;
    statusText.textContent = 'ПОБЕДА!';
    statusText.style.color = '#0f0';
    score += 100;
    updateUI();
    showEndScreen('🎉 ПОБЕДА! 🎉', 'Ты сбежал из лабиринта!');
  }

  function loseGame() {
    gameActive = false;
    statusText.textContent = 'ПРОИГРАЛ';
    statusText.style.color = '#f00';
    showEndScreen('💀 ТЕБЯ ПОЙМАЛИ 💀', 'Попробуй ещё раз!');
  }

  function showEndScreen(title, desc) {
    endTitle.textContent = title;
    endDesc.textContent = desc;
    endOverlay.classList.remove('hidden');
    cancelAnimationFrame(frameId);
  }

  function startGame() {
    generateMaze();
    startOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    gameActive = true;
    timeLeft = 60;
    score = 0;
    updateUI();
    loop();
  }

  function restartGame() {
    startGame();
  }

  function loop() {
    if (!gameActive) return;
    update();
    draw();
    frameId = requestAnimationFrame(loop);
  }

  // Обработчики кнопок
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', restartGame);

  // Старт по тапу по холсту (для мобильных)
  canvas.addEventListener('pointerdown', (e) => {
    if (startOverlay.style.display !== 'none' && !gameActive && !endOverlay.classList.contains('hidden')) {
      startGame();
    }
  });
})();
</script>
</body>
</html>
