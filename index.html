<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Побег Раптора: Fullscreen</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Шапка */
        header {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
            flex-shrink: 0; /* Чтобы шапка не сжималась */
        }

        h1 { 
            margin: 0; 
            font-size: 20px; 
            text-align: center;
            pointer-events: none;
        }

        .fs-btn {
            position: absolute;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 20px;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Контейнер игры */
        #game-container {
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border: 3px solid #ecf0f1;
            border-radius: 8px;
            background: #34495e;
            /* В обычном режиме ограничиваем высоту */
            max-height: 55vh; 
            width: auto;
            transition: all 0.3s ease;
            display: flex; /* Центрируем канвас внутри */
            justify-content: center;
            align-items: center;
        }

        canvas { display: block; }

        /* UI Слой (Меню) */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 20;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            border-radius: 5px;
        }
        .hidden { display: none !important; }
        
        button.start-btn {
            padding: 15px 40px;
            font-size: 22px;
            cursor: pointer;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 50px;
            margin-top: 20px;
            box-shadow: 0 4px 0 #219150;
            text-transform: uppercase;
            font-weight: bold;
        }
        button.start-btn:active { transform: translateY(4px); box-shadow: none; }

        /* Кнопки управления */
        #controls {
            width: 100%;
            max-width: 280px;
            height: 160px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 10px;
            margin-bottom: 20px;
            flex-shrink: 0; /* Чтобы кнопки не сжимались */
            transition: all 0.3s ease;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            transition: background 0.1s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        .ctrl-btn:active, .ctrl-btn.pressed {
            background: rgba(46, 204, 113, 0.4);
            border-color: #2ecc71;
            transform: scale(0.95);
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

        /* --- СТИЛИ ДЛЯ ПОЛНОЭКРАННОГО РЕЖИМА --- */
        body.fullscreen-mode {
            justify-content: center;
        }

        body.fullscreen-mode #game-container {
            /* Убираем границы и тени в фуллскрине для чистоты */
            border: none;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
            max-height: none;
            width: 100%;
            height: 100%;
            /* Важно: позволяем JS управлять размером канваса внутри */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* В фуллскрине кнопки становятся полупрозрачными и ложатся поверх игры */
        body.fullscreen-mode #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.5; 
            margin: 0;
            z-index: 50;
            height: 180px; /* Чуть больше зона нажатия */
        }
        
        /* Делаем кнопки более заметными при наведении/нажатии даже в фуллскрине */
        body.fullscreen-mode .ctrl-btn:active, 
        body.fullscreen-mode .ctrl-btn.pressed {
            opacity: 1;
            background: rgba(46, 204, 113, 0.6);
        }

        @media (max-height: 600px) {
            h1 { font-size: 16px; }
            #controls { height: 130px; gap: 5px; }
            .ctrl-btn { font-size: 24px; border-radius: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🦖 Побег Раптора 👹</h1>
        <button class="fs-btn" onclick="toggleFullScreen()">[ ⛶ ]</button>
    </header>
    
    <div id="game-container">
        <canvas id="mazeCanvas"></canvas>
        <div id="ui-layer">
            <h2 id="msg-title">Готов?</h2>
            <p id="msg-desc" style="font-size: 16px; line-height: 1.4;">
                Используй кнопки или свайпы.<br>
                Найди выход 🚪 раньше монстра!
            </p>
            <button class="start-btn" onclick="startGame()">ИГРАТЬ</button>
        </div>
    </div>

    <!-- Экранные кнопки -->
    <div id="controls">
        <div class="ctrl-btn" id="btn-up">⬆️</div>
        <div class="ctrl-btn" id="btn-left">⬅️</div>
        <div class="ctrl-btn" id="btn-down">⬇️</div>
        <div class="ctrl-btn" id="btn-right">➡️</div>
    </div>

<script>
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');
    const uiLayer = document.getElementById('ui-layer');
    const msgTitle = document.getElementById('msg-title');
    const msgDesc = document.getElementById('msg-desc');

    // Настройки
    const COLS = 11; 
    const ROWS = 11;
    const MOVE_SPEED = 0.35; 
    const MONSTER_MOVE_INTERVAL = 1200; 
    const MONSTER_VISION = 3; 
    let CELL_SIZE = 30;

    let maze = [];
    let gameRunning = false;
    let monsterInterval = null;
    let animationFrameId = null;

    let player = { gx: 0, gy: 0, x: 0, y: 0, facingRight: true, isMoving: false };
    let monster = { gx: 0, gy: 0, x: 0, y: 0 };
    let exitPos = { x: 0, y: 0 };

    // --- ЛОГИКА ПОЛНОЭКРАННОГО РЕЖИМА ---
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error enabling full-screen: ${err.message}`);
            });
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    // Слушаем изменение режима экрана
    document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) {
            document.body.classList.add('fullscreen-mode');
        } else {
            document.body.classList.remove('fullscreen-mode');
        }
        // Обязательно пересчитываем размер при переключении
        setTimeout(resize, 100); 
    });

    // --- АДАПТИВНЫЙ РАЗМЕР ---
    function resize() {
        const isFS = document.body.classList.contains('fullscreen-mode');
        
        let availableWidth, availableHeight;

        if (isFS) {
            // В фуллскрине вычитаем высоту шапки (~50px) и зону кнопок (~200px)
            availableWidth = window.innerWidth;
            availableHeight = window.innerHeight - 250; 
        } else {
            // В обычном режиме
            availableWidth = window.innerWidth * 0.95;
            availableHeight = window.innerHeight * 0.55;
        }
        
        const cellW = Math.floor(availableWidth / COLS);
        const cellH = Math.floor(availableHeight / ROWS);
        
        // Выбираем меньший размер, чтобы влезло и по ширине, и по высоте
        CELL_SIZE = Math.min(cellW, cellH, 60); // 60 - макс размер клетки

        canvas.width = COLS * CELL_SIZE;
        canvas.height = ROWS * CELL_SIZE;
        
        if (gameRunning || maze.length > 0) draw();
    }
    
    window.addEventListener('resize', resize);
    // Первый запуск
    resize();

    // --- ГЕНЕРАЦИЯ ЛАБИРИНТА ---
    function generateMaze() {
        maze = [];
        for (let y = 0; y < ROWS; y++) {
            let row = [];
            for (let x = 0; x < COLS; x++) {
                row.push({ visited: false, walls: { top: true, right: true, bottom: true, left: true } });
            }
            maze.push(row);
        }

        let stack = [{x: 0, y: 0}];
        maze[0][0].visited = true;

        while (stack.length > 0) {
            let current = stack[stack.length - 1];
            let neighbors = [];
            const dirs = [{dx:0, dy:-1}, {dx:1, dy:0}, {dx:0, dy:1}, {dx:-1, dy:0}];
            
            for (let d of dirs) {
                let nx = current.x + d.dx, ny = current.y + d.dy;
                if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !maze[ny][nx].visited) 
                    neighbors.push({x: nx, y: ny});
            }

            if (neighbors.length > 0) {
                let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                let dx = current.x - next.x, dy = current.y - next.y;
                
                if (dx === 1) { maze[current.y][current.x].walls.left = false; maze[next.y][next.x].walls.right = false; }
                else if (dx === -1) { maze[current.y][current.x].walls.right = false; maze[next.y][next.x].walls.left = false; }
                if (dy === 1) { maze[current.y][current.x].walls.top = false; maze[next.y][next.x].walls.bottom = false; }
                else if (dy === -1) { maze[current.y][current.x].walls.bottom = false; maze[next.y][next.x].walls.top = false; }
                
                maze[next.y][next.x].visited = true;
                stack.push(next);
            } else {
                stack.pop();
            }
        }
    }

    // --- ИГРОВОЙ ЦИКЛ ---
    function startGame() {
        generateMaze();
        resize(); 
        
        player = { gx: 0, gy: 0, x: 0, y: 0, facingRight: true, isMoving: false };
        exitPos = { x: COLS - 1, y: ROWS - 1 };
        monster = { gx: COLS - 1, gy: 0, x: (COLS - 1) * CELL_SIZE, y: 0 };
        
        uiLayer.classList.add('hidden');
        gameRunning = true;
        
        if (monsterInterval) clearInterval(monsterInterval);
        monsterInterval = setInterval(moveMonsterLogic, MONSTER_MOVE_INTERVAL); 
        
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        gameLoop();
    }

    function gameLoop() {
        updateAnimations();
        draw();
        if (gameRunning) animationFrameId = requestAnimationFrame(gameLoop);
    }

    function updateAnimations() {
        const targetX = player.gx * CELL_SIZE;
        const targetY = player.gy * CELL_SIZE;
        const dx = targetX - player.x;
        const dy = targetY - player.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 1) {
            player.x = targetX;
            player.y = targetY;
            player.isMoving = false;
        } else {
            player.x += dx * MOVE_SPEED;
            player.y += dy * MOVE_SPEED;
            player.isMoving = true;
        }

        const mTargetX = monster.gx * CELL_SIZE;
        const mTargetY = monster.gy * CELL_SIZE;
        monster.x += (mTargetX - monster.x) * 0.15;
        monster.y += (mTargetY - monster.y) * 0.15;
    }

    // --- ЛОГИКА МОНСТРА ---
    function moveMonsterLogic() {
        if (!gameRunning) return;
        const dist = Math.abs(player.gx - monster.gx) + Math.abs(player.gy - monster.gy);

        if (dist <= MONSTER_VISION) {
            chasePlayer();
        } else {
            wanderRandomly();
        }
        checkWinLoss();
    }

    function chasePlayer() {
        let queue = [[{x: monster.gx, y: monster.gy}]];
        let visited = new Set([`${monster.gx},${monster.gy}`]);
        let path = null;

        while (queue.length > 0) {
            let currentPath = queue.shift();
            let pos = currentPath[currentPath.length - 1];

            if (pos.x === player.gx && pos.y === player.gy) { path = currentPath; break; }

            const moves = [
                {dx:0, dy:-1, wall:'top'}, {dx:1, dy:0, wall:'right'},
                {dx:0, dy:1, wall:'bottom'}, {dx:-1, dy:0, wall:'left'}
            ];

            for (let m of moves) {
                let nx = pos.x + m.dx, ny = pos.y + m.dy;
                let key = `${nx},${ny}`;
                if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && 
                    !visited.has(key) && !maze[pos.y][pos.x].walls[m.wall]) {
                    visited.add(key);
                    queue.push([...currentPath, {x: nx, y: ny}]);
                }
            }
        }

        if (path && path.length > 1) {
            monster.gx = path[1].x;
            monster.gy = path[1].y;
        }
    }

    function wanderRandomly() {
        const moves = [
            {dx:0, dy:-1, wall:'top'}, {dx:1, dy:0, wall:'right'},
            {dx:0, dy:1, wall:'bottom'}, {dx:-1, dy:0, wall:'left'}
        ];
        moves.sort(() => Math.random() - 0.5);

        for (let m of moves) {
            let nx = monster.gx + m.dx;
            let ny = monster.gy + m.dy;
            if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && 
                !maze[monster.gy][monster.gx].walls[m.wall]) {
                monster.gx = nx;
                monster.gy = ny;
                return;
            }
        }
    }

    // --- УПРАВЛЕНИЕ ---
    function handleInput(direction) {
        if (!gameRunning || player.isMoving) return;
        
        let cell = maze[player.gy][player.gx];
        let moved = false;

        switch(direction) {
            case 'up':    if (!cell.walls.top)    { player.gy--; moved = true; } break;
            case 'right': if (!cell.walls.right)  { player.gx++; player.facingRight = true; moved = true; } break;
            case 'down':  if (!cell.walls.bottom) { player.gy++; moved = true; } break;
            case 'left':  if (!cell.walls.left)   { player.gx--; player.facingRight = false; moved = true; } break;
        }

        if (moved) checkWinLoss();
    }

    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case 'ArrowUp': case 'w': case 'W': handleInput('up'); break;
            case 'ArrowRight': case 'd': case 'D': handleInput('right'); break;
            case 'ArrowDown': case 's': case 'S': handleInput('down'); break;
            case 'ArrowLeft': case 'a': case 'A': handleInput('left'); break;
        }
    });

    const btns = {
        'btn-up': 'up', 'btn-right': 'right', 
        'btn-down': 'down', 'btn-left': 'left'
    };

    Object.keys(btns).forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            el.classList.add('pressed');
            handleInput(btns[id]);
            setTimeout(() => el.classList.remove('pressed'), 150);
        });
    });

    let touchStartX = 0, touchStartY = 0;
    document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: false});

    document.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].screenX - touchStartX;
        const dy = e.changedTouches[0].screenY - touchStartY;
        
        if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return; 

        if (Math.abs(dx) > Math.abs(dy)) {
            handleInput(dx > 0 ? 'right' : 'left');
        } else {
            handleInput(dy > 0 ? 'down' : 'up');
        }
    }, {passive: false});

    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

    function checkWinLoss() {
        if (player.gx === exitPos.x && player.gy === exitPos.y) gameOver(true);
        else if (player.gx === monster.gx && player.gy === monster.gy) gameOver(false);
    }

    function gameOver(win) {
        gameRunning = false;
        clearInterval(monsterInterval);
        cancelAnimationFrame(animationFrameId);
        draw();
        
        uiLayer.classList.remove('hidden');
        msgTitle.innerText = win ? "🎉 ПОБЕДА!" : "💀 ПОЙМАН!";
        msgTitle.style.color = win ? "#2ecc71" : "#e74c3c";
        msgDesc.innerHTML = win 
            ? "Твой раптор спасся!<br>Попробуй еще раз?" 
            : "Монстр оказался хитрее...<br>Попробуй еще раз?";
    }

    function draw() {
        ctx.fillStyle = '#34495e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#ecf0f1';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                let cx = x * CELL_SIZE, cy = y * CELL_SIZE;
                let w = maze[y][x].walls;
                if (w.top) { ctx.moveTo(cx, cy); ctx.lineTo(cx + CELL_SIZE, cy); }
                if (w.right) { ctx.moveTo(cx + CELL_SIZE, cy); ctx.lineTo(cx + CELL_SIZE, cy + CELL_SIZE); }
                if (w.bottom) { ctx.moveTo(cx + CELL_SIZE, cy + CELL_SIZE); ctx.lineTo(cx, cy + CELL_SIZE); }
                if (w.left) { ctx.moveTo(cx, cy + CELL_SIZE); ctx.lineTo(cx, cy); }
            }
        }
        ctx.stroke();

        const off = CELL_SIZE / 2;
        const fontSize = Math.floor(CELL_SIZE * 0.7);
        ctx.font = `${fontSize}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        ctx.fillText('🚪', exitPos.x * CELL_SIZE + off, exitPos.y * CELL_SIZE + off);
        ctx.fillText('👹', monster.x + off, monster.y + off);

        ctx.save();
        ctx.translate(player.x + off, player.y + off);
        if (!player.facingRight) ctx.scale(-1, 1);
        ctx.fillText('🦖', 0, 0);
        ctx.restore();
    }
</script>
</body>
</html>
