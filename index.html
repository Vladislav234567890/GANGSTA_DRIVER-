<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PDA · GANGSTA DRIVE · MOBILE EDITION</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0b0f1a;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      touch-action: manipulation;
      position: fixed;
      width: 100%;
    }
    .pda {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #1e2636;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 0 0 3px #4c5a72;
      padding: 8px 6px 10px;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: all 0.3s ease;
    }
    /* Полноэкранный режим */
    .pda.fullscreen {
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }
    .pda.fullscreen .screen {
      border-radius: 0;
    }
    .screen {
      flex: 1;
      background: #0f121c;
      border-radius: 16px;
      padding: 6px 8px 8px;
      box-shadow: inset 0 0 30px #00000088, 0 0 0 2px #39475e;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: border-radius 0.3s ease;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 6px 6px 6px;
      border-bottom: 2px solid #2f3d54;
      color: #a3c0e0;
      font-size: 12px;
      letter-spacing: 1px;
      font-weight: bold;
      text-shadow: 0 0 8px #00a6ff60;
      gap: 4px;
      flex-wrap: wrap;
    }
    .status-bar .delta { display: flex; gap: 4px; }
    .status-bar .delta span {
      background: #1d2a3c;
      padding: 2px 6px;
      border-radius: 6px;
      color: #9bc9ff;
      font-size: 10px;
    }
    .timer {
      background: #1d2a3c;
      padding: 2px 8px;
      border-radius: 10px;
      color: #f2c94c;
      font-size: 14px;
      box-shadow: inset 0 0 12px #f2c94c30;
    }
    #gameCanvas {
      flex: 1;
      width: 100%;
      background: #2a3a4a;
      border-radius: 10px;
      display: block;
      margin: 4px 0;
      box-shadow: inset 0 0 50px #000000aa;
      touch-action: none;
    }
    .footer-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 6px 2px;
      border-top: 2px solid #2f3d54;
      color: #7a93b0;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      flex-wrap: wrap;
      gap: 4px;
    }
    .footer-panel .left { display: flex; gap: 8px; }
    .footer-panel .left span {
      background: #1d2a3c;
      padding: 2px 8px;
      border-radius: 8px;
      color: #b6d4f0;
      font-size: 11px;
    }
    .footer-panel .kills {
      background: #2a1f2a;
      padding: 2px 12px;
      border-radius: 20px;
      color: #ff6b7a;
      font-size: 14px;
      box-shadow: 0 0 12px #ff3b4a60;
    }
    .sub-mission {
      text-align: center;
      font-size: 10px;
      color: #6b8aaa;
      background: #101724;
      padding: 4px 0 3px;
      border-radius: 20px;
      margin: 4px 0 0;
      letter-spacing: 1px;
      font-weight: bold;
      text-transform: uppercase;
      border: 1px solid #2e405a;
      box-shadow: inset 0 0 12px #1f3144;
    }
    .sub-mission strong { color: #f2c94c; font-weight: 900; }
    
    .bottom-buttons {
      display: flex;
      gap: 6px;
      margin: 4px 0 0;
      padding: 0 2px;
    }
    
    .restart-btn {
      background: #1f2b3d;
      border: 2px solid #3f5470;
      color: #c0d8f0;
      font-size: 14px;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 30px;
      flex: 1;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      box-shadow: 0 0 0 1px #0b111e, inset 0 0 16px #2c405c;
      letter-spacing: 2px;
      touch-action: manipulation;
      transition: transform 0.1s, background 0.1s;
    }
    .restart-btn:active {
      background: #2f405a;
      border-color: #7a9bc0;
      transform: scale(0.95);
    }
    
    .fullscreen-btn {
      background: #1a2a1f;
      border: 2px solid #3a5a3a;
      color: #a0d8a0;
      font-size: 14px;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 30px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      box-shadow: 0 0 0 1px #0b1e0b, inset 0 0 16px #2c4a2c;
      letter-spacing: 1px;
      touch-action: manipulation;
      transition: transform 0.1s, background 0.1s;
      white-space: nowrap;
      min-width: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fullscreen-btn:active {
      background: #2a4a2a;
      border-color: #6aaa6a;
      transform: scale(0.95);
    }
    .fullscreen-btn.active {
      background: #2a3a1a;
      border-color: #6aaa6a;
      color: #80ff80;
      box-shadow: 0 0 20px #44ff4460, inset 0 0 16px #3a5a2a;
    }
    .fullscreen-icon {
      font-size: 20px;
      line-height: 1;
    }
    
    .corner-delta {
      position: absolute;
      color: #3f5777;
      font-size: 10px;
      opacity: 0.3;
      pointer-events: none;
    }
    .top-left { top: 18px; left: 14px; }
    .bottom-right { bottom: 18px; right: 14px; }
    .hp-bar {
      background: #1d2a3c;
      padding: 2px 8px;
      border-radius: 10px;
      color: #ff6b7a;
      font-size: 11px;
    }
    .controls-hint {
      font-size: 9px;
      color: #5a7a9a;
      text-align: center;
      padding: 2px 0;
      letter-spacing: 1px;
      margin-top: -2px;
    }
    .level-display {
      background: #1d2a3c;
      padding: 2px 10px;
      border-radius: 10px;
      color: #9bc9ff;
      font-size: 11px;
    }
    .boss-hp {
      background: #2a1a1a;
      padding: 2px 10px;
      border-radius: 10px;
      color: #ff8844;
      font-size: 11px;
      display: none;
    }
    .boss-hp.active { display: inline-block; }
    .debug {
      color: #0f0;
      font-size: 10px;
      text-align: center;
      background: #000;
      padding: 3px;
      margin-top: 2px;
      border-radius: 4px;
      font-family: monospace;
    }

    .touch-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 6px;
      gap: 6px;
      border-top: 1px solid #2f3d54;
      margin-top: 2px;
    }
    .touch-btn {
      background: #1f2b3d;
      border: 2px solid #3f5470;
      color: #c0d8f0;
      font-size: 18px;
      font-weight: bold;
      padding: 8px 10px;
      border-radius: 12px;
      font-family: 'Courier New', monospace;
      touch-action: manipulation;
      flex: 1;
      text-align: center;
      box-shadow: inset 0 0 10px #2c405c;
      transition: transform 0.1s, background 0.1s;
    }
    .touch-btn:active {
      background: #2f405a;
      border-color: #7a9bc0;
      transform: scale(0.93);
    }
    .touch-fire {
      background: #2a1f2a;
      border-color: #5a3a3a;
      color: #ff6b7a;
      box-shadow: 0 0 12px #ff3b4a40, inset 0 0 10px #3a2a2a;
    }
    .touch-fire:active {
      background: #4a2a2a;
      border-color: #8a4a4a;
      transform: scale(0.93);
    }

    .win-overlay, .lose-overlay, .start-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 200;
    }
    .win-overlay { background: rgba(0, 0, 0, 0.75); pointer-events: auto; }
    .win-overlay.show { display: flex; }
    .win-overlay .main {
      font-family: 'Courier New', monospace;
      font-size: 36px;
      font-weight: 900;
      color: #ffdd00;
      text-shadow: 0 0 40px #ffdd00, 0 0 80px #ffdd00, 0 0 120px #ff8800;
      letter-spacing: 8px;
      text-align: center;
      animation: winPulse 0.8s infinite alternate;
      pointer-events: none;
    }
    .win-overlay .sub {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #fff;
      opacity: 0.8;
      margin-top: 10px;
      letter-spacing: 3px;
      text-shadow: 0 0 20px #fff;
      pointer-events: none;
    }
    @keyframes winPulse {
      0% { transform: scale(1); opacity: 0.95; }
      100% { transform: scale(1.03); opacity: 1; }
    }

    .lose-overlay { background: rgba(139, 0, 0, 0.8); pointer-events: auto; }
    .lose-overlay.show { display: flex; }
    .lose-overlay .main {
      font-family: 'Courier New', monospace;
      font-size: 32px;
      font-weight: 900;
      color: #ff2222;
      text-shadow: 0 0 40px #ff0000, 0 0 80px #ff0000;
      letter-spacing: 6px;
      text-align: center;
      animation: loseShake 0.12s infinite alternate;
      pointer-events: none;
    }
    .lose-overlay .sub {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #ffaaaa;
      opacity: 0.9;
      margin-top: 10px;
      letter-spacing: 3px;
      text-shadow: 0 0 20px #ff0000;
      pointer-events: none;
    }
    @keyframes loseShake {
      0% { transform: translateX(-3px); }
      100% { transform: translateX(3px); }
    }

    .start-overlay {
      display: flex;
      background: transparent;
      animation: pulse 1s infinite alternate;
      z-index: 100;
      pointer-events: none;
    }
    .start-overlay.hidden { display: none; }
    .start-overlay .main {
      font-family: 'Courier New', monospace;
      font-size: 42px;
      font-weight: 900;
      color: #00ff88;
      text-shadow: 0 0 40px #00ff88, 0 0 80px #00ff88;
      letter-spacing: 6px;
    }
    .start-overlay .sub {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #fff;
      opacity: 0.7;
      margin-top: 8px;
      letter-spacing: 3px;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.04); opacity: 1; }
    }

    /* Индикатор выхода из полноэкранного режима */
    .exit-fullscreen-hint {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .exit-fullscreen-hint.show {
      opacity: 1;
    }

    /* Адаптация для ландшафтной ориентации */
    @media (orientation: landscape) {
      .touch-controls {
        padding: 2px 6px;
        gap: 4px;
      }
      .touch-btn {
        padding: 6px 8px;
        font-size: 14px;
      }
      .status-bar {
        font-size: 10px;
        padding: 1px 4px 3px 4px;
      }
      .timer {
        font-size: 11px;
        padding: 1px 6px;
      }
      .footer-panel {
        font-size: 9px;
        padding: 3px 4px 1px;
      }
      .sub-mission {
        font-size: 8px;
        padding: 2px 0 2px;
        margin: 2px 0 0;
      }
      .controls-hint {
        font-size: 7px;
      }
    }
  </style>
</head>
<body>
<div class="pda" id="pdaContainer">
  <div class="screen">
    <div class="corner-delta top-left">Δ = Δ</div>
    <div class="corner-delta bottom-right">Δ = Δ</div>

    <div class="exit-fullscreen-hint" id="exitFullscreenHint">
      ↩️ Нажми кнопку назад или сверни для выхода
    </div>

    <div class="start-overlay" id="startOverlay">
      <div class="main">СТАРТ</div>
      <div class="sub">нажми на экран</div>
    </div>
    <div class="win-overlay" id="winOverlay">
      <div class="main">🏆 ТЫ ПОБЕДИЛ!</div>
      <div class="sub">нажми РЕСТАРТ</div>
    </div>
    <div class="lose-overlay" id="loseOverlay">
      <div class="main">💀 ТЫ ПРОИГРАЛ</div>
      <div class="sub">нажми РЕСТАРТ</div>
    </div>

    <div class="status-bar">
      <div class="delta"><span>Δ</span><span>=</span><span>Δ</span></div>
      <div class="timer" id="timerDisplay">⏱️ 03:00</div>
      <div class="level-display" id="levelDisplay">УРОВЕНЬ 1</div>
      <div class="hp-bar" id="hpDisplay">❤️ 100</div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="touch-controls">
      <button class="touch-btn" id="btnUp">⬆️ ВВЕРХ</button>
      <button class="touch-btn touch-fire" id="btnFire">💥 ОГОНЬ</button>
      <button class="touch-btn" id="btnDown">⬇️ ВНИЗ</button>
    </div>

    <div class="footer-panel">
      <div class="left">
        <span>🎯</span>
        <span id="killCounter">0/10</span>
      </div>
      <div class="kills" id="enemyCountDisplay">🚗 0/10</div>
      <div class="boss-hp" id="bossHpDisplay">💀 БОСС: 5</div>
    </div>
    <div class="controls-hint">⬆️⬇️ ДВИЖЕНИЕ | 💥 СТРЕЛЬБА | ТАП ПО ЭКРАНУ</div>
    <div class="sub-mission">
      <span>⚡ убей всех врагов за <strong>3</strong> мин ⚡</span>
    </div>
    <div class="debug" id="debugDisplay">⚡ ТАПНИ ПО ЭКРАНУ ⚡</div>
  </div>
  
  <div class="bottom-buttons">
    <button class="restart-btn" id="restartBtn">⟳ РЕСТАРТ</button>
    <button class="fullscreen-btn" id="fullscreenBtn" title="Полноэкранный режим">
      <span class="fullscreen-icon">⛶</span>
    </button>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timerDisplay = document.getElementById('timerDisplay');
    const killCounter = document.getElementById('killCounter');
    const enemyCountDisplay = document.getElementById('enemyCountDisplay');
    const hpDisplay = document.getElementById('hpDisplay');
    const levelDisplay = document.getElementById('levelDisplay');
    const bossHpDisplay = document.getElementById('bossHpDisplay');
    const restartBtn = document.getElementById('restartBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const debugDisplay = document.getElementById('debugDisplay');
    const startOverlay = document.getElementById('startOverlay');
    const winOverlay = document.getElementById('winOverlay');
    const loseOverlay = document.getElementById('loseOverlay');
    const btnUp = document.getElementById('btnUp');
    const btnDown = document.getElementById('btnDown');
    const btnFire = document.getElementById('btnFire');
    const pdaContainer = document.getElementById('pdaContainer');
    const exitFullscreenHint = document.getElementById('exitFullscreenHint');

    // ========== ПОЛНОЭКРАННЫЙ РЕЖИМ ==========
    let isFullscreen = false;
    
    function toggleFullscreen() {
      if (!isFullscreen) {
        enterFullscreen();
      } else {
        exitFullscreen();
      }
    }

    function enterFullscreen() {
      const elem = document.documentElement;
      
      // Пробуем разные API для разных браузеров
      if (elem.requestFullscreen) {
        elem.requestFullscreen().catch(err => {
          console.log('Fullscreen error:', err);
          // Если не удалось, пробуем для конкретного элемента
          if (pdaContainer.requestFullscreen) {
            pdaContainer.requestFullscreen().catch(e => console.log('Container fullscreen error:', e));
          }
        });
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      } else if (pdaContainer.webkitRequestFullscreen) {
        pdaContainer.webkitRequestFullscreen();
      }
      
      // Визуальные изменения
      isFullscreen = true;
      pdaContainer.classList.add('fullscreen');
      fullscreenBtn.classList.add('active');
      fullscreenBtn.querySelector('.fullscreen-icon').textContent = '✕';
      
      // Показываем подсказку на мобильных
      if (/Mobi|Android/i.test(navigator.userAgent)) {
        exitFullscreenHint.classList.add('show');
        setTimeout(() => {
          exitFullscreenHint.classList.remove('show');
        }, 3000);
      }
      
      resizeCanvas();
      vibrate(20);
    }

    function exitFullscreen() {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      } else if (document.msExitFullscreen) {
        document.msExitFullscreen();
      }
      
      isFullscreen = false;
      pdaContainer.classList.remove('fullscreen');
      fullscreenBtn.classList.remove('active');
      fullscreenBtn.querySelector('.fullscreen-icon').textContent = '⛶';
      exitFullscreenHint.classList.remove('show');
      
      resizeCanvas();
      vibrate(15);
    }

    // Отслеживаем выход из полноэкранного режима (например, по кнопке Back)
    function handleFullscreenChange() {
      const isCurrentlyFullscreen = !!(
        document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.msFullscreenElement
      );
      
      if (!isCurrentlyFullscreen && isFullscreen) {
        isFullscreen = false;
        pdaContainer.classList.remove('fullscreen');
        fullscreenBtn.classList.remove('active');
        fullscreenBtn.querySelector('.fullscreen-icon').textContent = '⛶';
        exitFullscreenHint.classList.remove('show');
        resizeCanvas();
      }
    }

    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    document.addEventListener('msfullscreenchange', handleFullscreenChange);
    document.addEventListener('mozfullscreenchange', handleFullscreenChange);

    // Обработчик кнопки полноэкранного режима
    fullscreenBtn.addEventListener('click', (e) => {
      e.preventDefault();
      toggleFullscreen();
    });
    
    fullscreenBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      toggleFullscreen();
    });

    // Двойной тап для переключения полноэкранного режима
    let lastTapTime = 0;
    canvas.addEventListener('pointerdown', function(e) {
      const currentTime = new Date().getTime();
      const tapLength = currentTime - lastTapTime;
      
      if (tapLength < 300 && tapLength > 0) {
        // Двойной тап
        e.preventDefault();
        toggleFullscreen();
      }
      
      lastTapTime = currentTime;
    });

    // Адаптивный канвас
    function resizeCanvas() {
      const container = canvas.parentElement;
      const maxWidth = container.clientWidth - 16;
      const ratio = 800 / 400;
      let maxHeight;
      
      if (isFullscreen) {
        maxHeight = window.innerHeight * 0.5;
      } else {
        maxHeight = window.innerHeight * 0.4;
      }
      
      let w = Math.min(maxWidth, 800);
      let h = w / ratio;
      
      if (h > maxHeight) {
        h = maxHeight;
        w = h * ratio;
      }
      
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
    }
    
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 150));
    resizeCanvas();

    const GAME_DURATION = 180;
    let timeLeft = GAME_DURATION;
    let kills = 0;
    let gameActive = false;
    let gameOver = false;
    let victory = false;
    let level = 1;
    let bossActive = false;
    let bossDefeated = false;
    let totalEnemiesPerLevel = 10;
    let enemiesSpawned = 0;
    let bossSpawned = false;
    let gameStarted = false;
    let frameCount = 0;
    let lastTime = performance.now();

    const BALANCE = {
      PLAYER_HP: 100,
      ENEMY_HP: 1,
      BOSS_HP: 5,
      ENEMY_BULLET_DMG: 5,
      BOSS_BULLET_DMG: 50,
      PLAYER_BULLET_DMG: 1
    };

    const SCALE = 1.2;

    const player = {
      x: 80, y: canvas.height / 2,
      width: 70 * SCALE, height: 38 * SCALE,
      speed: 5 * SCALE,
      hp: BALANCE.PLAYER_HP, maxHp: BALANCE.PLAYER_HP,
      shootCooldown: 0, shootDelay: 8
    };

    let playerBullets = [];
    let enemies = [];
    const ENEMY_WIDTH = 64 * SCALE;
    const ENEMY_HEIGHT = 32 * SCALE;

    let boss = null;
    const BOSS_WIDTH = 110 * SCALE;
    const BOSS_HEIGHT = 60 * SCALE;

    let enemyBullets = [];
    let upPressed = false;
    let downPressed = false;

    function vibrate(ms) {
      if (navigator.vibrate) {
        navigator.vibrate(ms);
      }
    }

    // ========== КОЛЁСА ==========
    function drawWheel(cx, cy, r, isOffroad) {
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.stroke();
      
      if (isOffroad) {
        ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 2;
        const treads = 8;
        for (let i = 0; i < treads; i++) {
          const angle = (i / treads) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(cx + Math.cos(angle) * (r - 2), cy + Math.sin(angle) * (r - 2));
          ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
          ctx.stroke();
        }
      }
      
      ctx.fillStyle = '#777';
      ctx.beginPath(); ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#999'; ctx.lineWidth = 1; ctx.stroke();
      
      ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1.2;
      const spokes = 4;
      const angleStep = (Math.PI * 2) / spokes;
      const time = frameCount * 0.06;
      for (let i = 0; i < spokes; i++) {
        const angle = i * angleStep + time;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle) * r * 0.5, cy + Math.sin(angle) * r * 0.5);
        ctx.stroke();
      }
      
      ctx.fillStyle = '#bbb';
      ctx.beginPath(); ctx.arc(cx, cy, r * 0.2, 0, Math.PI * 2); ctx.fill();
    }

    // ========== СТРЕЛОК ==========
    function drawGunnerOnRoof(cx, roofTop) {

      ctx.fillStyle = '#2a3a1a';
      ctx.beginPath(); ctx.ellipse(cx, gunnerY + 0.5 * s, 6 * s, 3 * s, 0, Math.PI, 0); ctx.fill();
      ctx.fillRect(cx - 6 * s, gunnerY - 1 * s, 12 * s, 2 * s);
      
      ctx.fillStyle = '#111';
      ctx.fillRect(cx - 4 * s, gunnerY + 1.5 * s, 3 * s, 2.5 * s);
      ctx.fillRect(cx + 1 * s, gunnerY + 1.5 * s, 3 * s, 2.5 * s);
      ctx.strokeStyle = '#111'; ctx.lineWidth = 0.6;
      ctx.beginPath(); ctx.moveTo(cx - 1 * s, gunnerY + 2.5 * s); ctx.lineTo(cx + 1 * s, gunnerY + 2.5 * s); ctx.stroke();
      
      const gunX = cx + 4 * s;
      const gunY = gunnerY + 6 * s;
      
      ctx.fillStyle = '#333';
      ctx.fillRect(gunX, gunY - 1.5 * s, 14 * s, 2.5 * s);
      ctx.strokeStyle = '#555'; ctx.lineWidth = 0.6;
      ctx.strokeRect(gunX, gunY - 1.5 * s, 14 * s, 2.5 * s);
      
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(gunX, gunY - 1 * s, 6 * s, 2.5 * s);
      
      ctx.fillStyle = '#444';
      ctx.beginPath();
      ctx.moveTo(gunX + 8 * s, gunY + 0.5 * s);
      ctx.lineTo(gunX + 10 * s, gunY + 5 * s);
      ctx.lineTo(gunX + 12 * s, gunY + 5 * s);
      ctx.lineTo(gunX + 10 * s, gunY + 0.5 * s);

    // ========== ИГРОВАЯ ЛОГИКА ==========
    function triggerGameOver(isVictory) {
      if (gameOver) return;
      gameActive = false;
      gameOver = true;
      victory = isVictory;
      winOverlay.classList.remove('show');
      loseOverlay.classList.remove('show');
      if (isVictory) {
        winOverlay.classList.add('show');
        debugDisplay.textContent = '🏆 ТЫ ПОБЕДИЛ!';
      } else {
        loseOverlay.classList.add('show');
        debugDisplay.textContent = '💀 ТЫ ПРОИГРАЛ';
      }
      upPressed = false;
      downPressed = false;
      updateUI();
    }

    function shootAtNearestEnemy() {
      if (!gameActive || gameOver || player.shootCooldown > 0) return;
      
      let target = null;
      let minDist = Infinity;
      
      for (let e of enemies) {
        const dist = Math.hypot(e.x + e.width/2 - player.x, e.y + e.height/2 - player.y);
        if (dist < minDist) {
          minDist = dist;
          target = e;
        }
      }
      
      if (bossActive && boss) {
        const dist = Math.hypot(boss.x + BOSS_WIDTH/2 - player.x, boss.y + BOSS_HEIGHT/2 - player.y);
        if (dist < minDist) {
          minDist = dist;
          target = boss;
        }
      }
      
      if (target) {
        const aimX = target.x + (target.width || BOSS_WIDTH) / 2;
        const aimY = target.y + (target.height || BOSS_HEIGHT) / 2;
        fireBullet(aimX, aimY);
      } else {
        fireBullet(player.x + 200, player.y);
      }
    }

    function fireBullet(aimX, aimY) {
      const dx = aimX - player.x;
      const dy = aimY - player.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 5) return;
      
      playerBullets.push({
        x: player.x + 40 * SCALE,
        y: player.y - 5 * SCALE,
        vx: (dx / dist) * 10,
        vy: (dy / dist) * 10,
        radius: 5 * SCALE,
        life: 80,
        damage: BALANCE.PLAYER_BULLET_DMG
      });
      player.shootCooldown = player.shootDelay;
    }

    function startGame() {
      if (gameOver) {
        restartGame();
        return;
      }
      startOverlay.classList.add('hidden');
      gameStarted = true;
      gameActive = true;
      lastTime = performance.now();
      debugDisplay.textContent = '🎮 ИГРА НАЧАЛАСЬ!';
    }

    // Обработчики кнопок управления
    btnUp.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      upPressed = true;
      if (!gameStarted && !gameOver) startGame();
      vibrate(10);
    });
    btnUp.addEventListener('pointerup', (e) => {
      e.preventDefault();
      upPressed = false;
    });
    btnUp.addEventListener('pointerleave', () => { upPressed = false; });
    btnUp.addEventListener('pointercancel', () => { upPressed = false; });
    
    btnDown.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      downPressed = true;
      if (!gameStarted && !gameOver) startGame();
      vibrate(10);
    });
    btnDown.addEventListener('pointerup', (e) => {
      e.preventDefault();
      downPressed = false;
    });
    btnDown.addEventListener('pointerleave', () => { downPressed = false; });
    btnDown.addEventListener('pointercancel', () => { downPressed = false; });
    
    btnFire.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (!gameStarted && !gameOver) {
        startGame();
        return;
      }
      if (gameOver) {
        restartGame();
        return;
      }
      if (gameActive) {
        shootAtNearestEnemy();
        vibrate(15);
      }
    });

    // Тап по канвасу
    canvas.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      if (!gameStarted && !gameOver) {
        startGame();
        return;
      }
      if (gameOver) {
        restartGame();
        return;
      }
      if (!gameActive) return;
      
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const tapX = (e.clientX - rect.left) * scaleX;
      const tapY = (e.clientY - rect.top) * scaleY;
      
      if (player.shootCooldown <= 0) {
        fireBullet(tapX, tapY);
        vibrate(10);
      }
    });

    function spawnEnemy() {
      if (!gameActive || gameOver || enemiesSpawned >= totalEnemiesPerLevel || bossActive) return;
      const y = 30 + Math.random() * (canvas.height - 60);
      enemies.push({
        x: canvas.width + 20 + Math.random() * 60,
        y: y,
        width: ENEMY_WIDTH,
        height: ENEMY_HEIGHT,
        speed: 1.2 + Math.random() * 1.8,
        hp: BALANCE.ENEMY_HP,
        shootCooldown: 12 + Math.random() * 30,
        shootDelay: 30 + Math.random() * 20
      });
      enemiesSpawned++;
    }

    function initEnemies() {
      enemies = [];
      enemiesSpawned = 0;
      for (let i = 0; i < Math.min(totalEnemiesPerLevel, 8); i++) {
        enemies.push({
          x: canvas.width + 20 + i * 100 + Math.random() * 50,
          y: 30 + Math.random() * (canvas.height - 60),
          width: ENEMY_WIDTH,
          height: ENEMY_HEIGHT,
          speed: 1.0 + Math.random() * 1.8,
          hp: BALANCE.ENEMY_HP,
          shootCooldown: 6 + Math.random() * 35,
          shootDelay: 30 + Math.random() * 20
        });
        enemiesSpawned++;
      }
    }

    function spawnBoss() {
      bossActive = true;
      bossDefeated = false;
      bossSpawned = true;
      boss = {
        x: canvas.width - 60,
        y: canvas.height / 2 - BOSS_HEIGHT / 2,
        width: BOSS_WIDTH,
        height: BOSS_HEIGHT,
        hp: BALANCE.BOSS_HP,
        maxHp: BALANCE.BOSS_HP,
        speed: 1.3,
        direction: 1,
        shootCooldown: 70,
        shootDelay: 70
      };
      bossHpDisplay.classList.add('active');
      bossHpDisplay.textContent = '💀 БОСС: ' + BALANCE.BOSS_HP;
      levelDisplay.textContent = '👹 БОСС';
      vibrate(50);
    }

    function checkLevelComplete() {
      if (gameOver) return false;
      if (bossSpawned && bossDefeated) {
        triggerGameOver(true);
        return true;
      }
      if (!bossActive && !bossSpawned && enemies.length === 0 && enemiesSpawned >= totalEnemiesPerLevel && gameActive) {
        spawnBoss();
        updateUI();
        return true;
      }
      return false;
    }

    function update(currentTime) {
      frameCount++;
      
      if (!gameStarted || gameOver || !gameActive) {
        lastTime = currentTime;
        return;
      }

      const deltaTime = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      timeLeft -= deltaTime;
      if (timeLeft <= 0) {
        timeLeft = 0;
        triggerGameOver(false);
        return;
      }

      if (upPressed) {
        player.y -= player.speed;
        if (player.y < 25) player.y = 25;
      }
      if (downPressed) {
        player.y += player.speed;
        if (player.y > canvas.height - 25) player.y = canvas.height - 25;
      }
      
      if (player.shootCooldown > 0) player.shootCooldown--;

      for (let e of enemies) {
        e.x -= e.speed;
        e.shootCooldown--;
        if (e.shootCooldown <= 0 && e.x < canvas.width - 20 && e.x > 0 && gameActive) {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          const dist = Math.hypot(dx, dy);
          if (dist > 0) {
            enemyBullets.push({
              x: e.x,
              y: e.y + e.height / 2,
              vx: (dx / dist) * 4.5,
              vy: (dy / dist) * 4.5,
              radius: 5 * SCALE,
              life: 120,
              damage: BALANCE.ENEMY_BULLET_DMG,
              isBossBullet: false
            });
            e.shootCooldown = e.shootDelay;
          }
        }
      }
      enemies = enemies.filter(e => e.x > -80);

      if (bossActive && boss) {
        boss.y += boss.speed * boss.direction;
        if (boss.y < 25) {
          boss.y = 25;
          boss.direction = 1;
        }
        if (boss.y + BOSS_HEIGHT > canvas.height - 25) {
          boss.y = canvas.height - 25 - BOSS_HEIGHT;
          boss.direction = -1;
        }
        
        boss.shootCooldown--;
        if (boss.shootCooldown <= 0 && boss.x > 50 && gameActive) {
          const dx = player.x - boss.x;
          const dy = player.y - (boss.y + BOSS_HEIGHT / 2);
          const dist = Math.hypot(dx, dy);
          if (dist > 0) {
            enemyBullets.push({
              x: boss.x,
              y: boss.y + BOSS_HEIGHT / 2,
              vx: (dx / dist) * 4.5,
              vy: (dy / dist) * 4.5,
              radius: 16 * SCALE,
              life: 160,
              damage: BALANCE.BOSS_BULLET_DMG,
              isBossBullet: true
            });
            boss.shootCooldown = boss.shootDelay;
          }
        }
      }

      for (let b of playerBullets) {
        b.x += b.vx;
        b.y += b.vy;
        b.life--;
      }
      playerBullets = playerBullets.filter(b => 
        b.life > 0 && b.x < canvas.width + 30 && b.x > -30 && b.y > -30 && b.y < canvas.height + 30
      );

      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        let hit = false;
        
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (b.x > e.x && b.x < e.x + e.width && b.y > e.y && b.y < e.y + e.height) {
            e.hp -= b.damage;
            playerBullets.splice(i, 1);
            hit = true;
            if (e.hp <= 0) {
              enemies.splice(j, 1);
              kills++;
              vibrate(20);
            }
            break;
          }
        }
        
        if (!hit && bossActive && boss) {
          if (b.x > boss.x && b.x < boss.x + BOSS_WIDTH && b.y > boss.y && b.y < boss.y + BOSS_HEIGHT) {
            boss.hp -= b.damage;
            playerBullets.splice(i, 1);
            hit = true;
            vibrate(25);
            bossHpDisplay.textContent = '💀 БОСС: ' + Math.max(0, boss.hp);
            if (boss.hp <= 0) {
              bossDefeated = true;
              bossActive = false;
              kills += 5;
              bossHpDisplay.classList.remove('active');
              vibrate(100);
              checkLevelComplete();
              updateUI();
              return;
            }
          }
        }
      }

      for (let b of enemyBullets) {
        b.x += b.vx;
        b.y += b.vy;
        b.life--;
      }
      enemyBullets = enemyBullets.filter(b => 
        b.life > 0 && b.x < canvas.width + 30 && b.x > -60 && b.y > -30 && b.y < canvas.height + 30
      );

      const px = player.x - 14 * SCALE;
      const py = player.y - 18 * SCALE;
      const pw = player.width;
      const ph = player.height;

      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        if (b.x > px && b.x < px + pw && b.y > py && b.y < py + ph) {
          player.hp -= b.damage;
          enemyBullets.splice(i, 1);
          vibrate(30);
          if (player.hp <= 0) {
            player.hp = 0;
            triggerGameOver(false);
            return;
          }
          break;
        }
      }

      for (let e of enemies) {
        if (e.x < px + pw && e.x + e.width > px && e.y < py + ph && e.y + e.height > py) {
          triggerGameOver(false);
          return;
        }
      }

      if (bossActive && boss) {
        if (boss.x < px + pw && boss.x + BOSS_WIDTH > px && boss.y < py + ph && boss.y + BOSS_HEIGHT > py) {
          triggerGameOver(false);
          return;
        }
      }

      if (!bossActive && !bossSpawned && enemies.length < 8 && enemiesSpawned < totalEnemiesPerLevel && Math.random() < 0.03) {
        spawnEnemy();
      }

      checkLevelComplete();
      updateUI();
    }

    function updateUI() {
      const mins = Math.floor(Math.max(0, timeLeft) / 60);
      const secs = Math.floor(Math.max(0, timeLeft) % 60);
      timerDisplay.textContent = '⏱️ ' + String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
      
      if (bossDefeated) {
        killCounter.textContent = kills + ' ★';
        enemyCountDisplay.textContent = '✅ ПОБЕДА';
      } else if (bossActive) {
        killCounter.textContent = kills + ' ★';
        enemyCountDisplay.textContent = '💀 БОСС';
      } else {
        killCounter.textContent = kills + '/' + totalEnemiesPerLevel;
        enemyCountDisplay.textContent = '🚗 ' + enemies.length + '/' + totalEnemiesPerLevel;
      }
      
      hpDisplay.textContent = '❤️ ' + Math.max(0, Math.floor(player.hp));
      
      if (!bossActive && !bossSpawned) {
        levelDisplay.textContent = 'УРОВЕНЬ ' + level;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
      gradient.addColorStop(0, '#1a2a3a');
      gradient.addColorStop(0.5, '#2a3a4a');
      gradient.addColorStop(1, '#1a2a3a');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.setLineDash([25, 35]);
      ctx.strokeStyle = '#5a7a5a';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(0, canvas.height / 2);
      ctx.lineTo(canvas.width, canvas.height / 2);
      ctx.stroke();
      ctx.setLineDash([]);
      
      ctx.strokeStyle = '#6a8a6a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, 15);
      ctx.lineTo(canvas.width, 15);
      ctx.moveTo(0, canvas.height - 15);
      ctx.lineTo(canvas.width, canvas.height - 15);
      ctx.stroke();

      for (let i = 0; i < enemies.length; i++) {
        drawEnemyCar(enemies[i], i);
      }
      if (bossActive && boss) {
        drawBossTank();
      }
      drawPlayerJeep();
      
      for (let b of playerBullets) {
        ctx.fillStyle = '#ffdd44';
        ctx.shadowColor = '#ffaa00';
        ctx.shadowBlur = 16;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      
      for (let b of enemyBullets) {
        ctx.fillStyle = b.isBossBullet ? '#ff4400' : '#ff6666';
        ctx.shadowColor = b.isBossBullet ? '#ff2200' : '#ff0000';
        ctx.shadowBlur = b.isBossBullet ? 30 : 12;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = b.isBossBullet ? '#ffaa00' : '#ffaaaa';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function restartGame() {
      timeLeft = GAME_DURATION;
      kills = 0;
      gameActive = false;
      gameOver = false;
      victory = false;
      level = 1;
      bossActive = false;
      bossDefeated = false;
      bossSpawned = false;
      boss = null;
      player.y = canvas.height / 2;
      player.hp = BALANCE.PLAYER_HP;
      player.shootCooldown = 0;
      playerBullets = [];
      enemyBullets = [];
      enemies = [];
      totalEnemiesPerLevel = 10;
      enemiesSpawned = 0;
      
      bossHpDisplay.classList.remove('active');
      levelDisplay.textContent = 'УРОВЕНЬ 1';
      winOverlay.classList.remove('show');
      loseOverlay.classList.remove('show');
      startOverlay.classList.remove('hidden');
      gameStarted = false;
      
      upPressed = false;
      downPressed = false;
      
      initEnemies();
      updateUI();
      debugDisplay.textContent = '👆 ТАПНИ ПО ЭКРАНУ ДЛЯ СТАРТА';
      vibrate(50);
    }

    winOverlay.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      restartGame();
    });
    
    loseOverlay.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      restartGame();
    });

    restartBtn.addEventListener('click', (e) => {
      e.preventDefault();
      restartGame();
    });
    
    restartBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      restartGame();
    });

    // Обработчик клавиши F для полноэкранного режима
    document.addEventListener('keydown', (e) => {
      if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        toggleFullscreen();
      }
      if (e.key === 'Escape' && isFullscreen) {
        // Не предотвращаем стандартное поведение Escape
        setTimeout(() => {
          if (!document.fullscreenElement) {
            handleFullscreenChange();
          }
        }, 100);
      }
    });

    function gameLoop(currentTime) {
      update(currentTime);
      draw();
      requestAnimationFrame(gameLoop);
    }

    initEnemies();
    updateUI();
    requestAnimationFrame(gameLoop);
    debugDisplay.textContent = '👆 ТАПНИ ПО ЭКРАНУ ДЛЯ СТАРТА';
  })();
</script>
</body>
